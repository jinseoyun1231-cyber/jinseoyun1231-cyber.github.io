<!DOCTYPE html>

      background: linear-gradient(135deg, #f8f3ff 0%, #f3f9ff 100%);

    }
    .wrapper {
      max-width: 760px;
      margin: 0 auto;

    }
    .card {

    }

      margin: 28px 0 12px;
      color: #4f4d6b;
    }
    p, li {
      line-height: 1.75;
      font-size: 1rem;
      color: #3c3a54;
    }
    ul {
      padding-left: 1.2rem;
      margin: 0;
    }
    li {
      margin-bottom: 10px;
    }
    .divider {
      border: none;
      height: 1px;
      background: linear-gradient(to right, rgba(118, 94, 255, 0), rgba(118, 94, 255, 0.25), rgba(118, 94, 255, 0));
      margin: 32px 0;
    }
    .footer {
      margin-top: 32px;
      color: #6e6c8a;
      font-size: 0.95rem;
    }
  </style>
</head>
